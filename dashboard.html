<!DOCTYPE html>
<html>
<head>
<title>Event Dashboard</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>🎉 College Events</h1>

<section class="event-form">

<input id="eventName" placeholder="Event Name">
<input id="eventDate" type="date">
<input id="eventLocation" placeholder="Location">
<input id="posterUrl" placeholder="Poster Image URL">

<button onclick="submitEvent()">Submit Event Proposal</button>

</section>

<h2>Upcoming Events</h2>

<div id="eventContainer" class="card-grid"></div>

<h2>College Authorities</h2>

<div class="card-grid">

<div class="profile-card">
<img src="https://i.imgur.com/1X6n8.jpg">
<h3>Principal</h3>
<p>Dr.K.N Nandurkar</p>
</div>

<div class="profile-card">
<img src="https://i.imgur.com/1X6n8.jpg">
<h3>HOD Computer</h3>
<p>Prof.Anuradha Pawar</p>
</div>

<div class="profile-card">
<img src="https://i.imgur.com/1X6n8.jpg">
<h3>Event Coordinator</h3>
<p>Miss.P.P Wagh</p>
</div>

</div>

<script src="script.js"></script>

</body>
</html>
